name: Update DDL Data

on:
  schedule:
    - cron: '17 3 * * 2'
  workflow_dispatch:
    inputs:
      topic_id:
        description: Optional topic id to refresh
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      JUST_DDL_HUB_OWNER: Just-Agent
      JUST_DDL_HUB_REPO: just-ddl
      DISPATCH_TOKEN: ${{ secrets.JUST_DDL_DISPATCH_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm run crawl
        env:
          TOPIC_ID: ${{ inputs.topic_id }}
      - run: npm run validate
      - run: npm run link-check
        env:
          LINK_CHECK_TIMEOUT_MS: '6500'
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: data: update topic family data
          file_pattern: 'data/*.json data/topics/**/*.json'
      - name: Notify Just-DDL Hub
        if: ${{ env.DISPATCH_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.DISPATCH_TOKEN }}
        run: |
          gh api "repos/${JUST_DDL_HUB_OWNER}/${JUST_DDL_HUB_REPO}/dispatches" \
            --method POST \
            -f event_type=topic-updated \
            -f client_payload[topic_id]="${{ inputs.topic_id || github.event.repository.name }}" \
            -f client_payload[source_repo]="${GITHUB_REPOSITORY}" \
            -f client_payload[source_sha]="${GITHUB_SHA}" \
            -f client_payload[run_id]="${GITHUB_RUN_ID}"
      - name: Dispatch token not configured
        if: ${{ env.DISPATCH_TOKEN == '' }}
        run: echo "::notice::JUST_DDL_DISPATCH_TOKEN is not configured; Hub sync will wait for its scheduled workflow."
