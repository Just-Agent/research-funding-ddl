name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm run build
      - name: Prepare static site
        run: |
          mkdir -p dist
          cp -R public-data dist/public-data
          if [ -f index.html ]; then cp index.html dist/index.html; else echo '<!doctype html><meta charset="utf-8"><title>Just-DDL Topic Family</title><h1>Just-DDL Topic Family</h1>' > dist/index.html; fi
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5
